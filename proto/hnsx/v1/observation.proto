syntax = "proto3";

package hnsx.v1;

option go_package = "github.com/hnsx-io/hnsx/go/proto/gen/go/hnsx/v1";

// Observation is the atomic unit of observable agent behavior.
message Observation {
  string observation_id = 1;
  string trace_id = 2;
  string session_id = 3;
  string domain_id = 4;
  string domain_version = 5;
  string step_id = 6;
  string agent_id = 7;
  string parent_id = 8;
  string kind = 9;
  string role = 10;
  string payload = 11;
  string metadata = 12;
  int64 created_at_ms = 13;
}

// Cost captures the monetary and token cost of a single agent invocation.
message Cost {
  double total_cost_usd = 1;
  int64 prompt_tokens = 2;
  int64 completion_tokens = 3;
  string model = 4;
  string provider = 5;
}

// AuditRecord is an immutable security/operations log entry.
message AuditRecord {
  string record_id = 1;
  int64 timestamp_ms = 2;
  string session_id = 3;
  string domain_id = 4;
  string action = 5;
  string actor = 6;
  string actor_type = 7;
  string resource = 8;
  string resource_type = 9;
  string decision = 10;
  string reason = 11;
  string details = 12;
}

// MetricValue is a single metric sample.
message MetricValue {
  string name = 1;
  double value = 2;
  map<string, string> labels = 3;
  int64 timestamp_ms = 4;
}
