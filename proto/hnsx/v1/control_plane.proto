syntax = "proto3";

package hnsx.v1;

option go_package = "github.com/hnsx-io/hnsx/proto/gen/go/hnsx/v1";

service Registry {
  rpc RegisterDomain(RegisterDomainRequest) returns (DomainRef);
  rpc UnregisterDomain(DomainRef) returns (Empty);
  rpc GetDomain(DomainRef) returns (DomainSpec);
  rpc ListDomains(ListDomainsRequest) returns (DomainList);
}

service Scheduler {
  rpc ScheduleSession(ScheduleSessionRequest) returns (SessionRef);
  rpc GetSession(SessionRef) returns (SessionStatus);
  rpc ListSessions(ListSessionsRequest) returns (SessionList);
}

service Discovery {
  rpc DiscoverRuntime(DiscoverRequest) returns (RuntimeList);
}

service TelemetryService {
  rpc RecordTrace(TraceRecord) returns (Empty);
  rpc QueryTraces(QueryTraceRequest) returns (TraceList);
  rpc RecordInvocation(InvocationRecord) returns (Empty);
  rpc QueryInvocationMetrics(InvocationMetricsRequest) returns (InvocationMetrics);
}

service EvalService {
  rpc RunEval(RunEvalRequest) returns (EvalRunRef);
  rpc GetEvalRun(EvalRunRef) returns (EvalRunResult);
  rpc ListEvalRuns(ListEvalRunsRequest) returns (EvalRunList);
}

message RegisterDomainRequest {
  DomainSpec spec = 1;
}

message DomainSpec {
  string id = 1;
  string version = 2;
  string description = 3;
  string yaml_body = 4;
}

message DomainRef {
  string id = 1;
  string version = 2;
}

message DomainList {
  repeated DomainSpec domains = 1;
}

message ScheduleSessionRequest {
  string domain_id = 1;
  string domain_version = 2;
  string payload = 3; // JSON string
}

message SessionRef {
  string session_id = 1;
}

message SessionStatus {
  string session_id = 1;
  string state = 2; // pending, running, completed, failed
  string result = 3; // JSON string
  int64 started_at_ms = 4;
  int64 completed_at_ms = 5;
}

message ListSessionsRequest {
  string domain_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message SessionList {
  repeated SessionStatus sessions = 1;
}

message RuntimeInfo {
  string runtime_id = 1;
  repeated string capabilities = 2;
  string region = 3;
  string version = 4;
}

message DiscoverRequest {
  repeated string capabilities = 1;
  string region = 2;
}

message RuntimeList {
  repeated RuntimeInfo runtimes = 1;
}

message TraceRecord {
  string trace_id = 1;
  string session_id = 2;
  string domain_id = 3;
  string step_id = 4;
  string agent_id = 5;
  int64 started_at_ms = 6;
  int64 duration_ms = 7;
  string input = 8; // JSON string
  string output = 9; // JSON string
}

message QueryTraceRequest {
  string domain_id = 1;
  string session_id = 2;
  int32 limit = 3;
}

message TraceList {
  repeated TraceRecord traces = 1;
}

message InvocationRecord {
  string session_id = 1;
  string domain_id = 2;
  int64 started_at_ms = 3;
  int64 duration_ms = 4;
  double total_cost_usd = 5;
  int64 prompt_tokens = 6;
  int64 completion_tokens = 7;
}

message InvocationMetricsRequest {
  string domain_id = 1;
}

message InvocationMetrics {
  string domain_id = 1;
  int64 invocation_count = 2;
  double total_cost_usd = 3;
  int64 total_prompt_tokens = 4;
  int64 total_completion_tokens = 5;
  double avg_latency_ms = 6;
}

message RunEvalRequest {
  string domain_id = 1;
  string set_id = 2;
}

message EvalRunRef {
  string eval_run_id = 1;
}

message EvalRunResult {
  string eval_run_id = 1;
  string state = 2;
  double score = 3;
  int32 total = 4;
  int32 passed = 5;
  string report_url = 6;
}

message ListEvalRunsRequest {
  string domain_id = 1;
}

message EvalRunList {
  repeated EvalRunResult runs = 1;
}

message Empty {}
