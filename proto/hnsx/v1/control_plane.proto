syntax = "proto3";

package hnsx.v1;

import "hnsx/v1/domain.proto";
import "hnsx/v1/observation.proto";

option go_package = "github.com/hnsx-io/hnsx/server/proto/gen/go/hnsx/v1";

service DomainRegistryService {
  rpc RegisterDomain(RegisterDomainRequest) returns (RegisterDomainResponse);
  rpc UnregisterDomain(UnregisterDomainRequest) returns (UnregisterDomainResponse);
  rpc GetDomain(GetDomainRequest) returns (GetDomainResponse);
  rpc ListDomains(ListDomainsRequest) returns (ListDomainsResponse);
}

service SessionSchedulerService {
  // DEPRECATED as of V1.1: replaced by SchedulerService.PullSession in
  // proto/hnsx/v1/worker.proto. V1.1 inverts the request direction: workers
  // pull sessions from the server, the server does not push to them.
  rpc ScheduleSession(ScheduleSessionRequest) returns (ScheduleSessionResponse) {
    option deprecated = true;
  }
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
}

service RuntimeDiscoveryService {
  rpc DiscoverRuntime(DiscoverRuntimeRequest) returns (DiscoverRuntimeResponse);
}

service TelemetryService {
  rpc RecordTrace(RecordTraceRequest) returns (RecordTraceResponse);
  rpc QueryTraces(QueryTracesRequest) returns (QueryTracesResponse);
  rpc RecordInvocation(RecordInvocationRequest) returns (RecordInvocationResponse);
  rpc QueryInvocationMetrics(QueryInvocationMetricsRequest) returns (QueryInvocationMetricsResponse);
}

service EvalService {
  rpc RunEval(RunEvalRequest) returns (RunEvalResponse);
  rpc GetEvalRun(GetEvalRunRequest) returns (GetEvalRunResponse);
  rpc ListEvalRuns(ListEvalRunsRequest) returns (ListEvalRunsResponse);
}

message RegisterDomainRequest {
  DomainSpec spec = 1;
}

message RegisterDomainResponse {
  DomainRef domain = 1;
}

message UnregisterDomainRequest {
  DomainRef domain = 1;
}

message UnregisterDomainResponse {}

message GetDomainRequest {
  DomainRef domain = 1;
}

message GetDomainResponse {
  DomainSpec spec = 1;
}

message ListDomainsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListDomainsResponse {
  repeated DomainSpec domains = 1;
  int32 total = 2;
}

message ScheduleSessionRequest {
  string domain_id = 1;
  string domain_version = 2;
  string payload = 3;
}

message ScheduleSessionResponse {
  string session_id = 1;
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  SessionStatus session = 1;
}

message ListSessionsRequest {
  string domain_id = 1;
  string state = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListSessionsResponse {
  repeated SessionStatus sessions = 1;
  int32 total = 2;
}

message SessionStatus {
  string session_id = 1;
  string domain_id = 2;
  string domain_version = 3;
  string state = 4;
  string result = 5;
  string trace_id = 6;
  int64 started_at_ms = 7;
  int64 completed_at_ms = 8;
}

message DiscoverRuntimeRequest {
  repeated string capabilities = 1;
  string region = 2;
}

message DiscoverRuntimeResponse {
  repeated RuntimeInfo runtimes = 1;
}

message RuntimeInfo {
  string runtime_id = 1;
  repeated string capabilities = 2;
  string region = 3;
  string version = 4;
}

message RecordTraceRequest {
  string trace_id = 1;
  string session_id = 2;
  string domain_id = 3;
  string domain_version = 4;
  repeated Observation observations = 5;
}

message RecordTraceResponse {}

message QueryTracesRequest {
  string domain_id = 1;
  string session_id = 2;
  string trace_id = 3;
  int32 limit = 4;
}

message QueryTracesResponse {
  repeated TraceRecord traces = 1;
}

message TraceRecord {
  string trace_id = 1;
  string session_id = 2;
  string domain_id = 3;
  string domain_version = 4;
  repeated Observation observations = 5;
}

message RecordInvocationRequest {
  string session_id = 1;
  string domain_id = 2;
  int64 started_at_ms = 3;
  int64 duration_ms = 4;
  double total_cost_usd = 5;
  int64 prompt_tokens = 6;
  int64 completion_tokens = 7;
}

message RecordInvocationResponse {}

message QueryInvocationMetricsRequest {
  string domain_id = 1;
}

message QueryInvocationMetricsResponse {
  string domain_id = 1;
  int64 invocation_count = 2;
  double total_cost_usd = 3;
  int64 total_prompt_tokens = 4;
  int64 total_completion_tokens = 5;
  double avg_latency_ms = 6;
}

message RunEvalRequest {
  string domain_id = 1;
  string domain_version = 2;
  string set_id = 3;
  string orchestration = 4;
  string baseline_run_id = 5;
}

message RunEvalResponse {
  string eval_run_id = 1;
}

message GetEvalRunRequest {
  string eval_run_id = 1;
}

message GetEvalRunResponse {
  EvalRunResult result = 1;
}

message ListEvalRunsRequest {
  string domain_id = 1;
  string set_id = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListEvalRunsResponse {
  repeated EvalRunResult results = 1;
  int32 total = 2;
}

message EvalRunResult {
  string eval_run_id = 1;
  string domain_id = 2;
  string set_id = 3;
  string state = 4;
  double score = 5;
  int32 total = 6;
  int32 passed = 7;
  double total_cost_usd = 8;
  int64 duration_ms = 9;
  string baseline_run_id = 10;
  repeated EvalCaseResult cases = 11;
}

message EvalCaseResult {
  string case_id = 1;
  string session_id = 2;
  double score = 3;
  bool passed = 4;
  string actual = 5;
  string details = 6;
}
