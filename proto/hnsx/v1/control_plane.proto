syntax = "proto3";
package hnsx.v1;

service Registry {
  rpc RegisterDomain(DomainSpec) returns (DomainRef);
  rpc UnregisterDomain(DomainRef) returns (Empty);
  rpc ListDomains(Empty) returns (DomainList);
}

service Scheduler {
  rpc RegisterInstance(InstanceInfo) returns (InstanceRef);
  rpc Heartbeat(InstanceRef) returns (Empty);
  rpc UnregisterInstance(InstanceRef) returns (Empty);
  rpc ListInstances(DomainRef) returns (InstanceList);
}

service Discovery {
  rpc Discover(DiscoverRequest) returns (InstanceList);
}

service Telemetry {
  rpc RecordTrace(TraceRecord) returns (Empty);
  rpc QueryTraces(QueryTraceRequest) returns (TraceList);
  rpc RecordInvocation(InvocationRecord) returns (Empty);
  rpc QueryInvocationMetrics(InvocationMetricsRequest) returns (InvocationMetrics);
}

message DomainSpec {
  string id = 1;
  string version = 2;
  string yaml_body = 3;
}

message DomainRef {
  string id = 1;
  string version = 2;
}

message DomainList { repeated DomainSpec domains = 1; }

message InstanceInfo {
  string instance_id = 1;
  string domain_id = 2;
  repeated string tags = 3;
  string region = 4;
  repeated string capabilities = 5;
}

message InstanceRef { string instance_id = 1; }

message InstanceList { repeated InstanceInfo instances = 1; }

message DiscoverRequest {
  string domain_id = 1;
  repeated string tags = 2;
  string region = 3;
}

message TraceRecord {
  string session_id = 1;
  string domain_id = 2;
  string step_id = 3;
  string agent_id = 4;
  int64 started_at_ms = 5;
  int64 duration_ms = 6;
  string input = 7;
  string output = 8;
}

message QueryTraceRequest {
  string domain_id = 1;
  string session_id = 2;
}

message TraceList { repeated TraceRecord traces = 1; }

message InvocationRecord {
  string session_id = 1;
  string domain_id = 2;
  int64 started_at_ms = 3;
  int64 duration_ms = 4;
  double total_cost_usd = 5;
  int64 prompt_tokens = 6;
  int64 completion_tokens = 7;
}

message InvocationMetricsRequest {
  string domain_id = 1;
}

message InvocationMetrics {
  string domain_id = 1;
  int64 invocation_count = 2;
  double total_cost_usd = 3;
  int64 total_prompt_tokens = 4;
  int64 total_completion_tokens = 5;
  double avg_latency_ms = 6;
}

message Empty {}

service Runtime {
  rpc Trigger(TriggerRequest) returns (stream TriggerResponse);
}

message TriggerRequest {
  string domain_id = 1;
  string session_id = 2;
  string payload = 3; // JSON string
}

message TriggerResponse {
  oneof item {
    ChunkText text = 1;
    ChunkError error = 2;
    ChunkDone done = 3;
  }
}

message ChunkText { string content = 1; }
message ChunkError { string message = 1; }
message ChunkDone { string variables = 1; } // JSON string
