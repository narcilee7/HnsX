version: v2
managed:
  enabled: true

# Generated Go code lands inside the hnsx-server Go module so the server can
# consume the proto types directly (no replace / separate module required).
plugins:
  - local: protoc-gen-go
    out: ../hnsx-server/proto/gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: ../hnsx-server/proto/gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../hnsx-server/proto/gen/go
    opt:
      - paths=source_relative

# TypeScript generation: enabled only when the corresponding protoc plugins
# are present (consumed by the Console / Node SDK in a separate job). Add a
# `make proto-ts` target so the generator doesn't fail under backend CI.
# - local: protoc-gen-es
#   out: ../sdk/node/src/gen
#   opt:
#     - target=ts
# - local: protoc-gen-connect-query
#   out: ../sdk/node/src/gen
#   opt:
#     - target=ts
