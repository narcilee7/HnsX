version: v2
managed:
  enabled: true
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-es
    out: gen/ts
    opt:
      - target=ts
  - local: protoc-gen-connect-query
    out: gen/ts
    opt:
      - target=ts
  - local: protoc-gen-python
    out: gen/python
