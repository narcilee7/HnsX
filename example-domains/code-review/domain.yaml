id: code-review
version: 0.3.0
description: |
  W12 Multi-Agent demonstration: a primary reviewer agent decides when to
  delegate to a summarizer peer. The peer returns its summary as the
  delegate_to tool result.
harness:
  agents:
    reviewer:
      id: reviewer
      provider: claude-code
      model: sonnet
      adapter:
        kind: claude-code
        timeout_seconds: 300
      system_prompt: reviewer-prompt
    summarizer:
      id: summarizer
      provider: claude-code
      model: sonnet
      adapter:
        kind: claude-code
        timeout_seconds: 30
      system_prompt: summarizer-prompt
  prompts:
    reviewer-prompt:
      type: system
      template: |
        Review the following diff and reply with a JSON array of findings.
        Each finding is { "file": string, "line": number, "severity": "info"|"warn"|"error", "message": string }.
        After you have the findings, call the `delegate_to` tool to hand
        them off to the summarizer agent for the final PR comment.
    summarizer-prompt:
      type: system
      template: |
        Summarize review findings into 3 bullets for a PR comment.
  session:
    mode: multi-turn
    agent: reviewer
  orchestration:
    strategy: multi_agent
    multi_agent:
      allowed_agents:
        - summarizer
      tool_name: delegate_to
