id: code-review
version: 0.2.0
description: |
  Reviews a git diff and reports issues with file:line citations,
  then summarizes the findings for a PR comment.
harness:
  agents:
    reviewer:
      id: reviewer
      provider: claude-code
      model: sonnet
      adapter:
        kind: claude-code
        timeout_seconds: 300
      system_prompt: reviewer-prompt
    summarizer:
      id: summarizer
      provider: claude-code
      model: sonnet
      adapter:
        kind: claude-code
        timeout_seconds: 30
      system_prompt: summarizer-prompt
  prompts:
    reviewer-prompt:
      type: system
      template: |
        Review the following diff and reply with a JSON array of findings.
        Each finding is { "file": string, "line": number, "severity": "info"|"warn"|"error", "message": string }.
    summarizer-prompt:
      type: system
      template: |
        Summarize the review findings into 3 bullets for a PR comment.
  session:
    mode: workflow
    workflow:
      entry: review
      steps:
        - id: review
          agent: reviewer
          next: summarize
          output: findings
        - id: summarize
          agent: summarizer
          input:
            findings: "${findings}"
          output: summary
