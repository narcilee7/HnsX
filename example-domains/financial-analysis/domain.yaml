id: financial-analysis
version: 0.3.0
description: |
  W12 Plan-and-Solve demonstration: the primary analyst agent first
  drafts a plan (fetch quote, gather news, synthesize), then executes
  each step with optional reflection between steps.
harness:
  agents:
    analyst:
      id: analyst
      provider: openai
      model: gpt-4o
      adapter:
        kind: openai
        timeout_seconds: 60
      system_prompt: analyst-prompt
  prompts:
    analyst-prompt:
      type: system
      template: |
        You are a financial analyst. You have an http tool to fetch market
        data. Plan your work, execute step by step, and produce a clear,
        directional 4-sentence analysis at the end.
  tools:
    yahoo_quote:
      kind: http
      name: yahoo_quote
      description: Fetch a stock quote from the Yahoo Finance v8 API.
      config:
        base_url: https://query1.finance.yahoo.com
        schema:
          type: object
          properties:
            path:
              type: string
              description: |
                Full URL path including query string, e.g.
                /v8/finance/chart/AAPL?interval=1d&range=1d
          required:
            - path
  policy:
    permissions:
      allow_network: true
      allow_file_write: false
      allow_shell: false
      allow_file_delete: false
    budget:
      max_cost_usd: 0.50
      max_turns: 10
  session:
    mode: multi-turn
    agent: analyst
  orchestration:
    strategy: plan_and_solve
    plan_and_solve:
      max_replans: 2
      replan_after_step: true
      reflection: true
