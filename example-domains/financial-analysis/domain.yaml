id: financial-analysis
version: 0.1.0
description: |
  Pulls a stock quote and produces a short analysis using a local
  Ollama model for the lookup and OpenAI for the final write-up.
agents:
  - id: quoter
    description: Fetches the latest quote for a ticker via the http tool.
    model:
      provider: ollama
      model: llama3.1
    adapter:
      timeout_seconds: 15
    tools:
      - kind: http
        name: yahoo_quote
        config:
          base_url: https://query1.finance.yahoo.com
          description: Fetch a stock quote from Yahoo Finance v8/finance/chart API.
          schema:
            type: object
            properties:
              path:
                type: string
                description: |
                  Full URL path including query string, e.g.
                  /v8/finance/chart/AAPL?interval=1d&range=1d
            required:
              - path
    prompt:
      template: |
        You are the quoter. Use the `yahoo_quote` http tool to fetch the
        latest price for the requested ticker from Yahoo Finance and return
        it as JSON.
      variables: {}
  - id: analyst
    description: Writes the final analysis given quote + news.
    model:
      provider: openai
      model: gpt-4o
    adapter:
      timeout_seconds: 60
    prompt:
      template: |
        You are the analyst. Given the quote and news, write a 4-sentence
        analysis with a clear directional view.
      variables: {}
workflow:
  entry: fetch_quote
  steps:
    - id: fetch_quote
      agent: quoter
      output: quote
    - id: analyze
      agent: analyst
      input:
        quote: "${steps.fetch_quote.output}"
