id: workflow-demo
version: 0.1.0
description: |
  Demonstrates the workflow session mode. A classifier step tags the input,
  then a responder step receives the classification via step input. Uses the
  echo adapter so it runs without external LLM keys.
harness:
  agents:
    classifier:
      id: classifier
      provider: echo
      adapter:
        kind: echo
      system_prompt: default

    responder:
      id: responder
      provider: echo
      adapter:
        kind: echo
      system_prompt: default

  prompts:
    default:
      type: system
      template: |
        You are a workflow demo assistant.

  policy:
    budget:
      max_turns: 5

  session:
    mode: workflow
    workflow:
      entry: classify
      steps:
        - id: classify
          agent: classifier
          output: classification
          next: respond
        - id: respond
          agent: responder
          input:
            classification: "${classification}"
          output: response
