services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hnsx
      POSTGRES_PASSWORD: hnsx
      POSTGRES_DB: hnsx
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hnsx -d hnsx"]
      interval: 5s
      timeout: 5s
      retries: 5

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo query
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: hnsx
    depends_on:
      - tempo
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro

  # ─────────────────────────────────────────────────────────────────────
  # HarnessX control plane (W23). Replaces the original `server` block;
  # builds from ./bin/harnessx-server so the local build is reused.
  # Mounts the example Domains so they're registered on first boot.
  # ─────────────────────────────────────────────────────────────────────
  server:
    image: harnessx-server:latest
    build:
      context: ../..
      dockerfile: deployments/local/Dockerfile.server
    ports:
      - "50052:50051"
      - "50062:50061"
    environment:
      HNSX_HTTP_ADDR: "0.0.0.0:50051"
      HNSX_GRPC_ADDR: "0.0.0.0:50061"
      HNSX_DATABASE_URL: "postgres://hnsx:hnsx@postgres:5432/hnsx?sslmode=disable"
      HNSX_MIGRATIONS_DIR: "/app/go/migrations"
      HNSX_SECRET_KEY: "${HNSX_SECRET_KEY:-hnsx-local-dev-secret-key-do-not-use-in-prod}"
      HNSX_OTEL_EXPORTER: "${HNSX_OTEL_EXPORTER:-otlp}"
      HNSX_OTEL_OTLP_ENDPOINT: "tempo:4317"
      HNSX_LOG_LEVEL: "${HNSX_LOG_LEVEL:-info}"
      HNSX_REDIS_ADDR: ""
    volumes:
      - ../../go/migrations:/app/go/migrations:ro
      - ../../example-domains:/app/example-domains:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:50051/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: ["server", "--multica-mode", "--seed-from", "/app/example-domains"]

  # ─────────────────────────────────────────────────────────────────────
  # HarnessX Daemon (W23). The single-binary daemon replaces the legacy
  # Python worker. Connects to the control plane over WS, spawns CC/Codex
  # subprocesses, streams observations back.
  #
  # Set HARNESSX_DAEMON_AGENT to the agent CLI you want the daemon to spawn
  # (claude | codex | codebuddy | copilot | cursor | opencode | openclaw |
  # hermes | pi | kimi | kiro | qoder | traecli | agy). Default: claude.
  # ─────────────────────────────────────────────────────────────────────
  daemon:
    image: harnessx-daemon:latest
    build:
      context: ../..
      dockerfile: deployments/local/Dockerfile.daemon
    environment:
      HARNESSX_SERVER_URL: "http://server:50051"
      HARNESSX_DAEMON_WORKSPACE_ID: "${HARNESSX_WORKSPACE_ID:-00000000-0000-0000-0000-000000000000}"
      HARNESSX_DAEMON_COMMAND: "${HARNESSX_DAEMON_AGENT:-claude}"
      HARNESSX_DAEMON_ARGS: "${HARNESSX_DAEMON_ARGS:--p --output-format stream-json --verbose}"
      HARNESSX_DAEMON_MAX_COST_USD: "${HARNESSX_DAEMON_MAX_COST_USD:-1.0}"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Mount the local agent CLIs so the daemon can spawn them.
      - ~/.claude:/root/.claude:ro
      - ~/.codex:/root/.codex:ro

volumes:
  postgres_data:
