services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hnsx
      POSTGRES_PASSWORD: hnsx
      POSTGRES_DB: hnsx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo query
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: hnsx
    depends_on:
      - tempo

volumes:
  postgres_data:
