apiVersion: v1
kind: Namespace
metadata:
  name: hnsx
  labels:
    app.kubernetes.io/name: hnsx
    app.kubernetes.io/component: control-plane
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hnsx-worker
  namespace: hnsx
  labels:
    app.kubernetes.io/name: hnsx-worker
    app.kubernetes.io/component: runtime-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hnsx-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hnsx-worker
        app.kubernetes.io/component: runtime-worker
    spec:
      containers:
        - name: worker
          # Replace with the published hnsx-worker image once the build
          # pipeline produces it. For local development mount the source
          # and run via `python -m hnsx_worker` instead.
          image: hnsx-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: HNSX_CONTROL_PLANE_ADDR
              value: "hnsx-server.hnsx:50061"
            - name: HNSX_WORKER_REGION
              value: "k8s"
            - name: HNSX_WORKER_LABELS
              value: "platform=k8s"
            - name: HNSX_WORKER_TENANT_ID
              value: "00000000-0000-0000-0000-000000000000"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          # Graceful shutdown: give the worker enough time to finish or
          # hand off its current session before SIGKILL.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          terminationGracePeriodSeconds: 30
