name: Deploy website to GitHub Pages

# ---------------------------------------------------------------------------
# Builds the Rspress docs site and deploys to GitHub Pages.
#
# The site renders markdown under website/docs/. That directory is the
# mirror of documents/, kept in sync by scripts/sync-docs.sh. We run
# the sync here BEFORE the build so the published site always reflects
# the source-of-truth documents/. We also expose make docs-sync-check
# as a separate CI gate (see ci.yml) so PRs that drift the mirror fail
# before merge.
# ---------------------------------------------------------------------------

on:
  push:
    branches:
      - main
    paths:
      - 'documents/**'
      - 'website/**'
      - 'scripts/sync-docs.sh'
      - '.github/workflows/website.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Sync documents/ → website/docs/
        run: |
          set -euo pipefail
          ./scripts/sync-docs.sh
          # Show what changed for the run log.
          git status --porcelain website/docs || true

      - name: Install dependencies
        run: pnpm install

      - name: Build website
        env:
          GH_PAGES: 'true'
        run: cd website && pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/dist
          # Don't commit the mirrored website/docs/ back to main.
          # Without this, the workflow would push a no-op commit on
          # every successful run.
          enable_jekyll: false