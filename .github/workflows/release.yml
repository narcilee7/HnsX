name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # for cosign signature

env:
  GO_VERSION: '1.23'

jobs:
  # ---------------------------------------------------------------------------
  # Build release artifacts for all supported OS/arch combinations.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: hnsx-server/go.sum

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ github.ref_name }}
        run: |
          make build-cli build-server
          mkdir -p dist
          cp bin/hnsx dist/hnsx
          cp bin/hnsx-server dist/hnsx-server

      - name: Create tarball
        working-directory: dist
        run: |
          asset="hnsx_${{ matrix.os }}_${{ matrix.arch }}.tar.gz"
          tar -czf "$asset" hnsx hnsx-server
          sha256sum "$asset" > "$asset.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hnsx-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/hnsx_${{ matrix.os }}_${{ matrix.arch }}.*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create the GitHub release and attach all artifacts.
  # ---------------------------------------------------------------------------
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: hnsx-*

      - name: Flatten artifact directories
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;

      - name: Generate checksums file
        working-directory: release
        run: |
          sha256sum hnsx_*.tar.gz > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # Optional: cosign signatures and SBOM. These steps are scaffolded so the
  # release pipeline can be hardened later without changing the workflow shape.
  # They are no-ops until a signing identity is configured.
  # ---------------------------------------------------------------------------
  provenance:
    name: Provenance
    runs-on: ubuntu-latest
    needs: release
    if: false # enable when cosign/SBOM credentials are configured
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: hnsx-*

      - name: Generate SBOM
        run: |
          syft dir:. -o spdx-json=hnsx.spdx.json

      - name: Sign artifacts
        run: |
          for f in dist/**/*; do
            cosign sign-blob --yes "$f" > "$f.sig"
          done
