name: CI

on:
  push:
    branches: [main, 'feat/**', 'refactor/**']
  pull_request:
    branches: [main, 'feat/**', 'refactor/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.23'
  BUF_VERSION: '1.47.0'
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ---------------------------------------------------------------------------
  # Proto: lint + generate (Go only — TS/Python are out of scope for this PR).
  # ---------------------------------------------------------------------------
  proto:
    name: Proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          version: ${{ env.BUF_VERSION }}

      - name: buf lint
        run: make proto-lint

      - name: buf generate (Go)
        run: make proto-gen

      - name: buf breaking (vs main)
        if: github.event_name == 'pull_request'
        run: make proto-breaking || true

  # ---------------------------------------------------------------------------
  # Backend: go vet + go test + build + smoke
  # ---------------------------------------------------------------------------
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: proto
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: hnsx-server/go.sum

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.2
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.18.1
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

      - name: go vet
        run: make vet

      - name: gofmt check
        run: |
          diff_out=$(gofmt -l hnsx-server sdk/go)
          if [ -n "$diff_out" ]; then echo "Need gofmt:"; echo "$diff_out"; exit 1; fi

      - name: go test
        run: make test-go

      - name: build binaries
        run: make build-go

      - name: smoke test
        run: ./scripts/smoke.sh

  # ---------------------------------------------------------------------------
  # TypeScript workspace: install + lint + type-check + build + test
  # ---------------------------------------------------------------------------
  ts:
    name: TypeScript workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm -r lint

      - name: type-check
        run: pnpm -r type-check

      - name: test
        run: pnpm -r test

      - name: build
        run: pnpm -r build

  # ---------------------------------------------------------------------------
  # Python worker: install + test
  # ---------------------------------------------------------------------------
  worker:
    name: Python worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install worker
        run: make worker-install

      - name: generate python proto stubs
        run: make proto-py

      - name: pytest
        run: make worker-test

  # ---------------------------------------------------------------------------
  # Final aggregation — all jobs must be green.
  # ---------------------------------------------------------------------------
  final:
    name: Final
    runs-on: ubuntu-latest
    needs: [proto, go, ts, worker]
    if: always()
    steps:
      - name: All green?
        run: |
          if [ "${{ needs.proto.result }}"   != "success" ] || \
             [ "${{ needs.go.result }}"      != "success" ] || \
             [ "${{ needs.ts.result }}"      != "success" ] || \
             [ "${{ needs.worker.result }}"  != "success" ]; then
            echo "A required job failed:"
            echo "  proto   : ${{ needs.proto.result }}"
            echo "  go      : ${{ needs.go.result }}"
            echo "  ts      : ${{ needs.ts.result }}"
            echo "  worker  : ${{ needs.worker.result }}"
            exit 1
          fi
          echo "All required jobs succeeded ✓"
          echo "  proto   : ${{ needs.proto.result }}"
          echo "  go      : ${{ needs.go.result }}"
          echo "  ts      : ${{ needs.ts.result }}"
          echo "  worker  : ${{ needs.worker.result }}"
