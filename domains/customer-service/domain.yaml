id: customer-service
version: 0.1.0
description: |
  Routes customer questions to the right specialist agent
  (triage, billing, technical).
agents:
  - id: triage
    description: Classifies the incoming question and routes to a specialist.
    model:
      provider: anthropic
      model: claude-haiku-4-5
    adapter:
      timeout_seconds: 30
    prompt:
      template: |
        You are a triage agent. Classify the user's question into
        one of: billing, technical, other. Reply with JSON only.
      variables: {}
  - id: billing
    description: Handles billing and subscription questions.
    model:
      provider: openai
      model: gpt-4o-mini
    adapter:
      timeout_seconds: 60
    prompt:
      template: |
        You are the billing specialist. Answer the user's billing question.
      variables: {}
workflow:
  entry: classify
  steps:
    - id: classify
      agent: triage
      output: classification
    - id: route
      agent: billing
      input:
        classification: "${steps.classify.output}"
