id: code-review
version: 0.1.0
description: |
  Reviews a git diff and reports issues with file:line citations,
  then summarizes the findings for a PR comment.
agents:
  - id: reviewer
    description: Reads a diff and emits structured findings.
    model:
      provider: claude-code
      model: sonnet
    adapter:
      timeout_seconds: 300
    prompt:
      template: |
        Review the following diff. Reply as a JSON array of findings,
        each with { file, line, severity, message }.
      variables: {}
  - id: summarizer
    description: Compresses findings into an executive summary.
    model:
      provider: anthropic
      model: claude-haiku-4-5
    adapter:
      timeout_seconds: 30
    prompt:
      template: |
        Summarize the review findings into 3 bullets for a PR comment.
      variables: {}
workflow:
  entry: review
  steps:
    - id: review
      agent: reviewer
      output: findings
    - id: summarize
      agent: summarizer
      input:
        findings: "${steps.review.output}"
