id: claude-triage
version: 0.1.0
description: |
  Triage flow using Anthropic's claude-haiku-4-5. Mirrors
  customer-service but routes the classifier through the Anthropic
  Messages API; the follow-up specialist uses OpenAI gpt-4o-mini so the
  workflow exercises two providers end-to-end.
agents:
  - id: claude-triage
    description: Classifies the question into billing / technical / other.
    model:
      provider: anthropic
      model: claude-haiku-4-5
    adapter:
      timeout_seconds: 30
    prompt:
      template: |
        You are a triage agent. Classify the user's question into one of
        {billing, technical, other}. Reply with JSON only.
      variables: {}
  - id: gpt-responder
    description: Drafts the final reply given the triage decision.
    model:
      provider: openai
      model: gpt-4o-mini
    adapter:
      timeout_seconds: 60
    prompt:
      template: |
        You are the responder. Given the classification, draft a short,
        helpful reply.
      variables: {}
workflow:
  entry: classify
  steps:
    - id: classify
      agent: claude-triage
      output: classification
    - id: respond
      agent: gpt-responder
      input:
        classification: "${steps.classify.output}"
