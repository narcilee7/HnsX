id: {{domain_id}}
version: 0.1.0
description: |
  Code review assistant for {{company_name}}.

harness:
  agents:
    reviewer:
      id: reviewer
      provider: anthropic
      model: claude-sonnet-4
      adapter:
        kind: anthropic
        timeout_seconds: 120
      system_prompt: review-prompt
      tool_refs:
        - self_check
  prompts:
    review-prompt:
      type: system
      template: |
        You are a senior engineer at {{company_name}} reviewing a pull request.
        Check for bugs, security issues, and style problems. Be concise.
  tools:
    self_check:
      kind: self_check
      name: self_check
      description: Self-check the review against quality criteria.
      config:
        rubric: |
          - No obvious bugs
          - No security leaks
          - Actionable feedback
        threshold: 0.7
  session:
    mode: multi-turn
    agent: reviewer
  policy:
    budget:
      max_cost_usd: 1.0
      max_turns: 5
    permissions:
      allow_network: false
      allow_file_write: false
      allow_shell: false
